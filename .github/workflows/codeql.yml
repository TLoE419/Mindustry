name: "CodeQL"

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ["java"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Clone Arc dependency
        run: |
          git clone https://github.com/Anuken/Arc.git ../Arc
          git -C ../Arc checkout 8c17f18ffb

      - name: Build with Gradle
        env:
          ANDROID_HOME: ""
          ANDROID_SDK_ROOT: ""
        run: ./gradlew core:build server:build desktop:build -x test --no-daemon -PlocalArc=true --configure-on-demand

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
